  # ── EVN Hà Nội ─────────────────────────────────────────────────────────────

  /api/hanoi/accounts:
    post:
      tags: [hanoi]
      summary: Thêm tài khoản EVN Hà Nội
      description: Cần HANOI_CREDENTIALS_SECRET. Mật khẩu lưu mã hóa AES-256-GCM.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, description: Tên đăng nhập / mã khách hàng }
                password: { type: string, description: Mật khẩu (lưu mã hóa) }
                label: { type: string, description: Nhãn tuỳ chọn }
      responses:
        "201": { description: "{ id, username, label }" }
        "409": { description: username đã tồn tại }
    get:
      tags: [hanoi]
      summary: Danh sách tài khoản Hà Nội
      description: |
        Không query → danh sách phân trang.  
        `?username=` → đúng 1 tài khoản theo tên đăng nhập.  
        `?maKhachHang=` hoặc `?maKH=` → mọi tài khoản gắn MA_KH (userinfo/hợp đồng); không dùng cùng lúc với `username`.
      parameters:
        - name: username
          in: query
          schema: { type: string }
          description: Tìm 1 tài khoản theo username đăng nhập
        - name: maKhachHang
          in: query
          schema: { type: string }
          description: Tra cứu theo mã khách hàng (alias maKH)
        - name: enabledOnly
          in: query
          schema: { type: string, enum: ["0", "1"] }
        - name: skip
          in: query
          schema: { type: integer, default: 0 }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200": { description: "{ accounts: [], matchedBy? }" }
        "400": { description: Truyền cả username và maKhachHang }

  /api/hanoi/accounts/bulk:
    post:
      tags: [hanoi]
      summary: Import hàng loạt tài khoản Hà Nội
      description: Tối đa 2000 bản ghi/request. Trùng username → skip.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accounts]
              properties:
                accounts:
                  type: array
                  items:
                    type: object
                    required: [username, password]
                    properties:
                      username: { type: string }
                      password: { type: string }
                      label: { type: string }
      responses:
        "200": { description: "{ inserted, skippedDuplicates, errors? }" }

  /api/hanoi/accounts/replace-bulk:
    post:
      tags: [hanoi]
      summary: Xóa toàn bộ + nạp lại (cần HANOI_ALLOW_ACCOUNT_REPLACE_BULK=true)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation, accounts]
              properties:
                confirmation:
                  type: string
                  enum: [DELETE_ALL_HANOI_ACCOUNTS]
                accounts:
                  type: array
                  items:
                    type: object
                    required: [username, password]
                    properties:
                      username: { type: string }
                      password: { type: string }
                      label: { type: string }
      responses:
        "200": { description: "{ deleted, inserted, skippedDuplicates }" }
        "403": { description: FEATURE_DISABLED }

  /api/hanoi/accounts/{id}:
    patch:
      tags: [hanoi]
      summary: Cập nhật tài khoản Hà Nội (enable/disable hoặc đổi mật khẩu)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                password: { type: string }
      responses:
        "200": { description: Cập nhật thành công }
        "404": { description: Không tìm thấy }

  /api/hanoi/tasks:
    post:
      tags: [hanoi]
      summary: Tạo task quét hóa đơn EVN Hà Nội
      description: |
        **Một** trong `hanoiAccountId` (hoặc alias `accountId`) **hoặc** `maKhachHang` (resolve đúng 1 account).
        Kỳ/tháng/năm: `ky|period`, `thang|month`, `nam|year`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hanoiAccountId: { type: string, description: ObjectId hex }
                accountId: { type: string, description: alias hanoiAccountId }
                maKhachHang: { type: string, description: Resolve tài khoản — không dùng cùng hanoiAccountId }
                ky: { type: integer, minimum: 1, maximum: 3 }
                period: { type: integer, minimum: 1, maximum: 3 }
                thang: { type: integer, minimum: 1, maximum: 12 }
                month: { type: integer, minimum: 1, maximum: 12 }
                nam: { type: integer, minimum: 2020, maximum: 2100 }
                year: { type: integer, minimum: 2020, maximum: 2100 }
      responses:
        "201": { description: "{ taskId, status: PENDING, payload }" }
        "200": { description: "isDuplicate: true — task PENDING/RUNNING cùng kỳ" }

  /api/hanoi/tasks/enqueue-all-enabled:
    post:
      tags: [hanoi]
      summary: Xếp hàng tất cả tài khoản Hanoi enabled (cùng kỳ/tháng/năm)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ky, thang, nam]
              properties:
                ky: { type: integer, minimum: 1, maximum: 3 }
                thang: { type: integer, minimum: 1, maximum: 12 }
                nam: { type: integer, minimum: 2020, maximum: 2100 }
      responses:
        "201": { description: "{ tasksCreated, skippedAlreadyActive, taskIdsSample }" }
        "200": { description: Không có task mới }

  /api/hanoi/ensure-bill:
    post:
      tags: [hanoi]
      summary: "Agent: kiểm tra cache hoặc xếp hàng quét"
      description: |
        **Chỉ một** trong `username` (đăng nhập CSKH) hoặc `maKhachHang` (mã KH tra cứu).
        Với `maKhachHang`: tra **DB trước** (đúng kỳ/tháng/năm), không cần resolve tài khoản nếu đã có `electricity_bills` parse.
        Webhook `hanoi.ensure_bill` khi `cache_hit` hoặc `already_queued` (nếu `AGENT_TASK_WEBHOOK_URL` set).
        Poll `GET /api/tasks/:taskId` khi `queued` / `already_queued`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Bắt buộc đủ kỳ/tháng/năm qua (ky|period), (thang|month), (nam|year) — code validate giống nhau.
              properties:
                username:
                  type: string
                  description: Tên đăng nhập CSKH (xor với maKhachHang)
                maKhachHang:
                  type: string
                  description: Mã KH tra cứu (xor với username)
                ky: { type: integer, minimum: 1, maximum: 3 }
                period: { type: integer, minimum: 1, maximum: 3, description: alias ky }
                thang: { type: integer, minimum: 1, maximum: 12 }
                month: { type: integer, minimum: 1, maximum: 12, description: alias thang }
                nam: { type: integer, minimum: 2020, maximum: 2100 }
                year: { type: integer, minimum: 2020, maximum: 2100, description: alias nam }
      responses:
        "200": { description: "outcome: cache_hit — bill trong DB (tien_dien ưu tiên)" }
        "202": { description: "outcome: queued | already_queued — taskId" }
        "400": { description: VALIDATION_* / HANOI_ACCOUNT_DISABLED }
        "404": { description: HANOI_ACCOUNT_NOT_FOUND / không resolve được MA }
        "409": { description: AMBIGUOUS — nhiều tài khoản cho cùng MA_KH }

  /api/hanoi/bills:
    get:
      tags: [hanoi]
      summary: Danh sách electricity_bills EVN Hà Nội
      parameters:
        - name: maKhachHang
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200": { description: "{ provider: EVN_HANOI, total, data: [] }" }

  /api/hanoi/online-payment-link:
    post:
      tags: [hanoi]
      summary: Lấy link thanh toán EVN Hà Nội (API GetListThongTinNoKhachHang)
      description: |
        **Một** selector tài khoản: `hanoiAccountId` **hoặc** `hanoiAccountUsername` **hoặc** `maKhachHang` (resolve đúng 1 account).
        Tuỳ chọn `maKhachHang` thứ hai — mã KH cần lấy link (normalize in hoa); mặc định lấy từ tài khoản.
        Worker gọi STS + userinfo (`maDvql`) + POST `/api/TraCuu/GetListThongTinNoKhachHang` → trường `paymentUrl` = `urlThanhToan` EVN.
        Mặc định **202** + taskId. Sync chỉ khi `HANOI_ONLINE_PAYMENT_LINK_SYNC_API_ENABLED=true` và `sync: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hanoiAccountId: { type: string, description: ObjectId hex }
                hanoiAccountUsername: { type: string, description: Tên đăng nhập CSKH }
                maKhachHang: { type: string, description: Chỉ để resolve account khi không có id/username }
                sync: { type: boolean, description: Chạy đồng bộ — cần env bật }
      responses:
        "200":
          description: Sync — `{ ok, paymentUrl?, code?, reason?, ... }` (chỉ khi env + sync)
        "202": { description: "{ outcome: queued|already_queued, taskId }" }
        "403": { description: FEATURE_DISABLED — HANOI_ONLINE_PAYMENT_LINK_API_ENABLED=false }
        "400": { description: VALIDATION_* / tài khoản disabled / wrong_password }

  /api/hanoi/contracts:
    get:
      tags: [hanoi]
      summary: Hợp đồng đã đồng bộ (hanoi_contracts)
      parameters:
        - name: hanoiAccountId
          in: query
          schema: { type: string }
          description: ObjectId hex — không dùng cùng maKhachHang
        - name: maKhachHang
          in: query
          schema: { type: string }
        - name: maKH
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, maximum: 200 }
      responses:
        "200": { description: "{ filter, total, contracts: [] }" }
        "400": { description: Thiếu query hoặc truyền cả hai filter }

  /api/hanoi/accounts/stats:
    get:
      tags: [hanoi]
      summary: Thống kê số lượng tài khoản (enabled/disabled/wrong_password)

  /api/hanoi/accounts/list-all:
    get:
      tags: [hanoi]
      summary: Danh sách toàn bộ có phân trang + credentialStatus
      parameters:
        - name: credentialStatus
          in: query
          schema: { type: string, enum: [all, ok, wrong_password] }
        - name: skip
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }

  /api/hanoi/accounts/wrong-credentials:
    get:
      tags: [hanoi]
      summary: Tài khoản đánh dấu sai mật khẩu STS

  /api/hanoi/sync-known-ma:
    post:
      tags: [hanoi]
      summary: Tạo job đồng bộ knownMaKhachHang (cần HANOI_SYNC_KNOWN_MA_API_ENABLED)
      responses:
        "403": { description: FEATURE_DISABLED }

  /api/hanoi/sync-known-ma/jobs:
    get:
      tags: [hanoi]
      summary: Danh sách job đồng bộ gần đây

  /api/hanoi/sync-known-ma/jobs/{jobId}:
    get:
      tags: [hanoi]
      summary: Chi tiết một job
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }

  /api/hanoi/accounts/{id}/password:
    put:
      tags: [hanoi]
      summary: Đổi mật khẩu (Postman-friendly)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
                verifyCredential: { type: boolean }
                correlationId: { type: string }
